[pytest]
testpaths = tests
norecursedirs = release_pkg frontend backend/uploads
addopts = -q -p no:cacheprovider
filterwarnings =
    error::DeprecationWarning:backend\..*
    error::PendingDeprecationWarning:backend\..*
    error::DeprecationWarning:tests\..*
    error::PendingDeprecationWarning:tests\..*
    ignore:.*:DeprecationWarning:(fastapi|starlette|pydantic|celery|redis|multipart|python_multipart)\..*
    ignore:.*:PendingDeprecationWarning:(fastapi|starlette|pydantic|celery|redis|multipart|python_multipart)\..*

