name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall -q backend tests scripts benchmarks test_hwaccel.py test_report.py

      - name: Run pytest
        run: python -m pytest -q

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify delivery
        run: python scripts/verify_delivery.py

      - name: Build checked release zip
        run: python scripts/make_release_zip.py --out release.zip --check

      - name: Verify release zip
        run: python scripts/verify_release_zip.py release.zip
