name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run real Redis/Celery/FFmpeg/CJK integration checks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fontconfig fonts-noto-cjk
          fc-cache -f

      - name: Start Redis with retry and health check
        run: |
          pulled=0
          for i in 1 2 3; do
            if docker pull redis:7-alpine; then
              pulled=1
              break
            fi
            echo "redis pull failed on attempt ${i}, retrying..."
            sleep 10
          done

          if [ "${pulled}" != "1" ]; then
            echo "::error::Redis image pull failed after 3 attempts"
            exit 1
          fi

          docker rm -f redis-ci >/dev/null 2>&1 || true
          docker run -d --name redis-ci -p 6379:6379 redis:7-alpine

          for i in {1..30}; do
            if docker exec redis-ci redis-cli ping; then
              echo "REDIS_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
              echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
              echo "CELERY_RESULT_BACKEND=redis://localhost:6379/1" >> "${GITHUB_ENV}"
              exit 0
            fi
            sleep 1
          done

          echo "::error::Redis did not become ready"
          docker logs redis-ci || true
          exit 1

      - name: Install locked Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt

      - name: Compile Python modules
        run: python -m compileall -q backend tests scripts benchmarks test_hwaccel.py test_report.py

      - name: Run complete backend tests with coverage
        run: python -m pytest -q --cov=backend --cov=scripts --cov-report=term-missing -ra

      - name: Stop Redis
        if: always()
        run: docker rm -f redis-ci >/dev/null 2>&1 || true

  frontend-validation:
    name: Frontend validation (Node 20)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

  delivery-validation:
    name: Delivery validation
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fontconfig fonts-noto-cjk
          fc-cache -f

      - name: Install locked Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run release source validation
        run: python scripts/verify_delivery.py --zip-only

      - name: Build checked release zip
        run: python scripts/make_release_zip.py --out release.zip --check

      - name: Verify release zip
        run: python scripts/verify_release_zip.py release.zip

      - name: Verify deterministic release zip SHA-256
        run: |
          python scripts/make_release_zip.py --out release-first.zip --check
          python - <<'PY'
          import os
          from pathlib import Path

          excluded_dirs = {
              ".git", ".github", ".vscode", ".tmp", "__pycache__", "node_modules",
              "dist", "build", ".vite", ".npm-cache", ".cache", "uploads",
              "outputs", "temp", "tmp", "data_tmp", "segments", "release_out",
              "release_pkg", ".release_staging", ".pytest_cache", ".mypy_cache",
              ".ruff_cache", "htmlcov", ".venv", "venv", "env",
          }
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in excluded_dirs for part in path.parts):
                  continue
              if path.suffix == ".zip":
                  continue
              os.utime(path, (978307200, 978307200))
          PY
          python scripts/make_release_zip.py --out release-second.zip --check
          first="$(sha256sum release-first.zip | cut -d' ' -f1)"
          second="$(sha256sum release-second.zip | cut -d' ' -f1)"
          printf 'release-first.zip  %s\nrelease-second.zip %s\n' "$first" "$second"
          if [ "$first" != "$second" ]; then
            echo "::error::release zip SHA-256 changed after source-file mtime changes"
            exit 1
          fi

      - name: Verify Docker delivery contract
        run: python scripts/verify_docker_config.py

      - name: Validate Docker Compose syntax
        run: docker compose config

  real-service-integration:
    name: Optional real Redis/Celery/FFmpeg/CJK integration
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration == 'true'
    env:
      API_HOST: "127.0.0.1"
      API_PORT: "8891"
      REDIS_URL: "redis://127.0.0.1:6379/0"
      CELERY_BROKER_URL: "redis://127.0.0.1:6379/0"
      CELERY_RESULT_BACKEND: "redis://127.0.0.1:6379/1"
      CELERY_WORKER_CONCURRENCY: "1"
      WHISPER_MODEL: "tiny"
      OPENAI_API_KEY: ""
      INTEGRATION_TEST_MODE: "true"
      INTEGRATION_RUNTIME_DIR: ".integration-runtime"
      UPLOAD_DIR: ".integration-runtime/uploads"
      OUTPUT_DIR: ".integration-runtime/outputs"
      TEMP_DIR: ".integration-runtime/tmp"
      INTEGRATION_WORK_DIR: ".integration-runtime/work"
      INTEGRATION_LOG_PATHS: "backend.log:celery-worker.log:celery-beat.log:integration-smoke.log"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install real integration system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fontconfig fonts-noto-cjk redis-server
          fc-cache -f

      - name: Start Redis for real integration tests
        run: |
          sudo service redis-server start
          redis-cli ping
          echo "REDIS_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/1" >> "${GITHUB_ENV}"

      - name: Install locked Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt

      - name: Verify FFmpeg availability
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Prepare integration runtime directories
        run: |
          rm -rf "${INTEGRATION_RUNTIME_DIR}"
          mkdir -p "${UPLOAD_DIR}" "${OUTPUT_DIR}" "${TEMP_DIR}" "${INTEGRATION_WORK_DIR}"

      - name: Start backend API
        run: |
          python -m uvicorn backend.main:app --host "${API_HOST}" --port "${API_PORT}" > backend.log 2>&1 &
          echo "$!" > backend.pid

      - name: Start Celery worker with concurrency 1
        run: |
          python -m celery -A backend.celery_app:celery_app worker --loglevel=info --pool=solo --concurrency=1 > celery-worker.log 2>&1 &
          echo "$!" > celery-worker.pid

          for i in {1..30}; do
            if python -m celery -A backend.celery_app:celery_app inspect ping --timeout=2; then
              exit 0
            fi
            sleep 2
          done

          echo "::error::Celery worker did not become ready"
          cat celery-worker.log || true
          exit 1

      - name: Start Celery beat
        run: |
          python -m celery -A backend.celery_app:celery_app beat --loglevel=info > celery-beat.log 2>&1 &
          echo "$!" > celery-beat.pid

      - name: Verify Celery beat startup
        run: |
          for i in {1..30}; do
            if grep -E "Scheduler|beat: Starting|DatabaseScheduler|LocalTime" celery-beat.log >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::Celery beat did not emit a startup banner"
          cat celery-beat.log || true
          exit 1

      - name: Wait for /readyz
        run: |
          for i in {1..60}; do
            if curl -fsS "http://${API_HOST}:${API_PORT}/readyz"; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend API did not become ready"
          cat backend.log || true
          exit 1

      - name: Run real CJK burn-in smoke
        env:
          RUN_CJK_BURNIN_SMOKE: "1"
        run: python -m pytest -q -m integration tests/test_cjk_burnin_integration.py -ra

      - name: Run real Redis/Celery integration smoke
        run: python scripts/run_real_integration_smoke.py --base-url "http://${API_HOST}:${API_PORT}" 2>&1 | tee integration-smoke.log

      - name: Upload integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-service-integration-logs
          path: |
            backend.log
            celery-worker.log
            celery-beat.log
            integration-smoke.log
            .integration-runtime
          if-no-files-found: warn

      - name: Stop integration processes
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" || true; fi
          if [ -f celery-worker.pid ]; then kill "$(cat celery-worker.pid)" || true; fi
          if [ -f celery-beat.pid ]; then kill "$(cat celery-beat.pid)" || true; fi
          cat backend.log || true
          cat celery-worker.log || true
          cat celery-beat.log || true
          cat integration-smoke.log || true

      - name: Manual maintainer model-download tests
        run: |
          cat <<'EOF'
          Larger-model Faster-Whisper coverage is intentionally not part of the standard push/pull_request CI path.
          Maintainers should still run the full release checklist smoke on Saturday, July 18, 2026 release candidates before final v1.0.0 acceptance when model cache/network budget is available.
          EOF
