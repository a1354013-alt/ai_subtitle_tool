name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run Redis/Celery/FFmpeg/CJK integration checks"
        required: false
        default: "false"

jobs:
  ci:
    name: CI Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up Node
        if: matrix.python-version == '3.11'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Redis with retry and health check
        run: |
          pulled=0
          for i in 1 2 3; do
            if docker pull redis:7-alpine; then
              pulled=1
              break
            fi
            echo "redis pull failed on attempt ${i}, retrying..."
            sleep 10
          done

          if [ "${pulled}" != "1" ]; then
            echo "::error::Redis image pull failed after 3 attempts"
            exit 1
          fi

          docker rm -f redis-ci >/dev/null 2>&1 || true
          docker run -d --name redis-ci -p 6379:6379 redis:7-alpine

          for i in {1..30}; do
            if docker exec redis-ci redis-cli ping; then
              echo "REDIS_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
              echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
              echo "CELERY_RESULT_BACKEND=redis://localhost:6379/1" >> "${GITHUB_ENV}"
              exit 0
            fi
            sleep 1
          done

          echo "::error::Redis did not become ready"
          docker logs redis-ci || true
          exit 1

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall -q backend tests scripts benchmarks test_hwaccel.py test_report.py

      - name: Run backend tests (pytest)
        run: python -m pytest -q

      - name: Install frontend dependencies
        if: matrix.python-version == '3.11'
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        if: matrix.python-version == '3.11'
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        if: matrix.python-version == '3.11'
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        if: matrix.python-version == '3.11'
        working-directory: frontend
        run: npm run test:ci

      - name: Build frontend
        if: matrix.python-version == '3.11'
        working-directory: frontend
        run: npm run build

      - name: Audit frontend production dependencies
        if: matrix.python-version == '3.11'
        working-directory: frontend
        run: npm audit --omit=dev

      - name: Verify delivery zip-only
        if: matrix.python-version == '3.11'
        run: python scripts/verify_delivery.py --zip-only

      - name: Build checked release zip
        if: matrix.python-version == '3.11'
        run: python scripts/make_release_zip.py --out release.zip --check

      - name: Verify release zip
        if: matrix.python-version == '3.11'
        run: python scripts/verify_release_zip.py release.zip

      - name: Verify deterministic release zip SHA-256
        if: matrix.python-version == '3.11'
        run: |
          python scripts/make_release_zip.py --out release-first.zip --check
          python scripts/make_release_zip.py --out release-second.zip --check
          sha256sum release-first.zip release-second.zip
          test "$(sha256sum release-first.zip | cut -d' ' -f1)" = "$(sha256sum release-second.zip | cut -d' ' -f1)"

      - name: Validate Docker configuration
        if: matrix.python-version == '3.11'
        run: python scripts/verify_docker_config.py

  integration:
    name: Optional Redis/Celery/FFmpeg/CJK integration
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fontconfig fonts-noto-cjk redis-server

      - name: Start Redis
        run: |
          sudo service redis-server start
          redis-cli ping
          echo "REDIS_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> "${GITHUB_ENV}"
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/1" >> "${GITHUB_ENV}"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          RUN_CJK_BURNIN_SMOKE: "1"
        run: python -m pytest -q -m integration
