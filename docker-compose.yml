services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      # Use the example file so `docker compose up` works out-of-the-box.
      # For real secrets, set environment variables (recommended) or edit a copy locally.
      - backend/.env.example
    environment:
      # Ensure Docker works even if backend/.env is configured for local (localhost) usage.
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CORS_ALLOW_CREDENTIALS: "true"
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
    command: celery -A backend.celery_app:celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
