services:
  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:15174
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "18000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      CELERY_WORKER_CONCURRENCY: "1"
    volumes:
      - ./backend/uploads:/app/uploads
    command: /bin/sh -c "celery -A backend.celery_app:celery_app worker --loglevel=info --concurrency=$${CELERY_WORKER_CONCURRENCY:-1}"
    healthcheck:
      disable: true
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:18000
    ports:
      - "15174:80"
    depends_on:
      - backend
